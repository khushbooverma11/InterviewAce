kind = "mobile"
previewPath = "/"
title = "InterviewAce"
version = "1.0.0"
id = "artifacts/interview-ace"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 22694

[services.development]
run = "pnpm --filter @workspace/interview-ace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/interview-ace", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/interview-ace", "run", "serve" ]

[services.env]
PORT = "22694"
BASE_PATH = "/"
